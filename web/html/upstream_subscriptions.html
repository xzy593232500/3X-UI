{{ template "page/head_start" .}}
{{ template "page/head_end" .}}

{{ template "page/body_start" .}}
<a-layout id="app" v-cloak :class="themeSwitcher.currentTheme + ' upstream-subscriptions-page'">
  <a-sidebar></a-sidebar>
  <a-layout id="content-layout">
    <a-layout-content>
      <a-spin :spinning="loading" :delay="300" tip="加载中" size="large">
        <a-card size="small" title="上游订阅">
          <template #extra>
            <a-space>
              <a-button icon="reload" @click="loadAll"></a-button>
              <a-button type="primary" icon="plus" @click="openUpstreamModal()">添加上游</a-button>
            </a-space>
          </template>
          <a-table row-key="id" :columns="upstreamColumns" :data-source="upstreams" :pagination="{ pageSize: 10 }"
            size="middle" :scroll="{ x: 1120 }">
            <template slot="enable" slot-scope="text, record">
              <a-switch :checked="record.enable" @change="checked => toggleUpstream(record, checked)"></a-switch>
            </template>
            <template slot="nodes" slot-scope="text, record">
              <a-button size="small" icon="cluster" @click="openNodeModal(record)">
                [[ record.nodes ? record.nodes.length : 0 ]]
              </a-button>
            </template>
            <template slot="traffic" slot-scope="text, record">
              <a-popover :overlay-class-name="themeSwitcher.currentTheme">
                <template slot="content">
                  <table cellpadding="2" width="100%">
                    <tr>
                      <td>上传</td>
                      <td>[[ formatTraffic(record.upload) ]]</td>
                    </tr>
                    <tr>
                      <td>下载</td>
                      <td>[[ formatTraffic(record.download) ]]</td>
                    </tr>
                    <tr>
                      <td>总量</td>
                      <td>[[ record.total > 0 ? formatTraffic(record.total) : '未知' ]]</td>
                    </tr>
                  </table>
                </template>
                <a-tag :color="remainingTrafficColor(record)">
                  剩余 [[ formatRemainingTraffic(record) ]]
                </a-tag>
              </a-popover>
            </template>
            <template slot="expiry" slot-scope="text, record">
              <a-popover v-if="record.expiryTime > 0" :overlay-class-name="themeSwitcher.currentTheme">
                <template slot="content">
                  [[ formatDateMs(record.expiryTime) ]]
                </template>
                <a-tag :color="remainingDaysColor(record.expiryTime)">
                  [[ formatRemainingDays(record.expiryTime) ]]
                </a-tag>
              </a-popover>
              <a-tag v-else color="purple">未知</a-tag>
            </template>
            <template slot="lastFetchedAt" slot-scope="text, record">
              <a-space direction="vertical" size="small">
                <span>[[ formatUnix(record.lastFetchedAt) ]]</span>
                <a-tooltip v-if="record.lastError" :title="record.lastError">
                  <a-tag color="red" class="error-tag">同步失败</a-tag>
                </a-tooltip>
              </a-space>
            </template>
            <template slot="action" slot-scope="text, record">
              <a-space>
                <a-button size="small" icon="cluster" @click="openNodeModal(record)">节点</a-button>
                <a-button size="small" icon="sync" :loading="syncingId === record.id"
                  @click="syncUpstream(record)"></a-button>
                <a-button size="small" icon="edit" @click="openUpstreamModal(record)"></a-button>
                <a-button size="small" icon="delete" type="danger" @click="confirmDeleteUpstream(record)"></a-button>
              </a-space>
            </template>
          </a-table>
        </a-card>
      </a-spin>
    </a-layout-content>
  </a-layout>

  <a-modal v-model="upstreamModal.visible" :title="upstreamModal.editId ? '编辑上游订阅' : '添加上游订阅'"
    :confirm-loading="upstreamModal.saving" :class="themeSwitcher.currentTheme" @ok="submitUpstream">
    <a-form layout="vertical">
      <a-form-item label="名称">
        <a-input v-model="upstreamModal.form.name" placeholder="例如：香港备用机场"></a-input>
      </a-form-item>
      <a-form-item label="订阅链接">
        <a-input v-model="upstreamModal.form.url" placeholder="https://..."></a-input>
      </a-form-item>
      <a-form-item label="启用">
        <a-switch v-model="upstreamModal.form.enable"></a-switch>
      </a-form-item>
    </a-form>
  </a-modal>

  <a-modal v-model="nodeModal.visible" :title="'上游节点 - ' + nodeModal.upstreamName" :footer="null"
    :class="themeSwitcher.currentTheme" width="980px">
    <a-alert type="info" show-icon message="关闭的节点不会出现在客户添加页，也不会输出到客户订阅或入站订阅。"
      class="mb-10"></a-alert>
    <a-table row-key="id" :columns="nodeColumns" :data-source="nodeModal.nodes" :pagination="false" size="middle"
      :scroll="{ x: 900, y: 520 }">
      <template slot="enable" slot-scope="text, record">
        <a-switch :checked="record.enable" @change="checked => toggleNode(record, checked)"></a-switch>
      </template>
      <template slot="sourceType" slot-scope="text, record">
        <a-tag :color="record.sourceType === 'clash' ? 'purple' : 'green'">[[ record.sourceType ]]</a-tag>
      </template>
      <template slot="copyLink" slot-scope="text, record">
        <a-tooltip :title="record.link || record.clash || '暂无可复制内容'">
          <a-button size="small" icon="copy" :disabled="!record.link && !record.clash"
            @click="copyNodeLink(record)"></a-button>
        </a-tooltip>
      </template>
    </a-table>
  </a-modal>
</a-layout>

{{template "page/body_scripts" .}}
{{template "component/aSidebar" .}}
{{template "component/aThemeSwitch" .}}
<script>
  const upstreamColumns = [{
      title: '名称',
      dataIndex: 'name',
      width: 160,
      ellipsis: true
    },
    {
      title: '启用',
      dataIndex: 'enable',
      scopedSlots: {
        customRender: 'enable'
      },
      width: 90
    },
    {
      title: '节点',
      scopedSlots: {
        customRender: 'nodes'
      },
      width: 100
    },
    {
      title: '剩余流量',
      scopedSlots: {
        customRender: 'traffic'
      },
      width: 150
    },
    {
      title: '剩余天数',
      scopedSlots: {
        customRender: 'expiry'
      },
      width: 130
    },
    {
      title: '最近同步',
      scopedSlots: {
        customRender: 'lastFetchedAt'
      },
      width: 160
    },
    {
      title: '订阅链接',
      dataIndex: 'url',
      ellipsis: true
    },
    {
      title: '操作',
      scopedSlots: {
        customRender: 'action'
      },
      width: 230,
      fixed: 'right'
    },
  ];

  const nodeColumns = [{
      title: '节点名',
      dataIndex: 'name',
      width: 240,
      ellipsis: true
    },
    {
      title: '协议',
      dataIndex: 'protocol',
      width: 100
    },
    {
      title: '类型',
      scopedSlots: {
        customRender: 'sourceType'
      },
      width: 110
    },
    {
      title: '启用',
      scopedSlots: {
        customRender: 'enable'
      },
      width: 90
    },
    {
      title: '复制',
      scopedSlots: {
        customRender: 'copyLink'
      },
      width: 80
    },
  ];

  new Vue({
    delimiters: ['[[', ']]'],
    el: '#app',
    mixins: [MediaQueryMixin],
    data: {
      themeSwitcher,
      loading: false,
      upstreamColumns,
      nodeColumns,
      upstreams: [],
      syncingId: null,
      upstreamModal: {
        visible: false,
        saving: false,
        editId: null,
        form: {
          name: '',
          url: '',
          enable: true,
        },
      },
      nodeModal: {
        visible: false,
        upstreamId: null,
        upstreamName: '',
        nodes: [],
      },
    },
    methods: {
      async loadAll() {
        this.loading = true;
        try {
          const upstreamMsg = await HttpUtil.get('/panel/api/subscription-market/upstreams/list');
          if (upstreamMsg.success && Array.isArray(upstreamMsg.obj)) {
            this.upstreams = upstreamMsg.obj;
            if (this.nodeModal.visible) {
              const current = this.upstreams.find(item => item.id === this.nodeModal.upstreamId);
              this.nodeModal.nodes = current && Array.isArray(current.nodes) ? current.nodes : [];
            }
          }
        } finally {
          this.loading = false;
        }
      },
      openUpstreamModal(record) {
        if (record) {
          this.upstreamModal.editId = record.id;
          this.upstreamModal.form = {
            name: record.name,
            url: record.url,
            enable: !!record.enable,
          };
        } else {
          this.upstreamModal.editId = null;
          this.upstreamModal.form = {
            name: '',
            url: '',
            enable: true,
          };
        }
        this.upstreamModal.visible = true;
      },
      openNodeModal(record) {
        this.nodeModal.upstreamId = record.id;
        this.nodeModal.upstreamName = record.name;
        this.nodeModal.nodes = Array.isArray(record.nodes) ? record.nodes : [];
        this.nodeModal.visible = true;
      },
      async submitUpstream() {
        const form = this.upstreamModal.form;
        if (!form.name || !form.url) {
          this.$message.error('名称和订阅链接不能为空');
          return;
        }
        this.upstreamModal.saving = true;
        try {
          const url = this.upstreamModal.editId ?
            `/panel/api/subscription-market/upstreams/update/${this.upstreamModal.editId}` :
            '/panel/api/subscription-market/upstreams/add';
          const msg = await HttpUtil.post(url, form);
          if (msg.success) {
            this.upstreamModal.visible = false;
            await this.loadAll();
          }
        } finally {
          this.upstreamModal.saving = false;
        }
      },
      async syncUpstream(record) {
        this.syncingId = record.id;
        try {
          await HttpUtil.post(`/panel/api/subscription-market/upstreams/sync/${record.id}`);
          await this.loadAll();
        } finally {
          this.syncingId = null;
        }
      },
      async toggleUpstream(record, checked) {
        const previous = record.enable;
        record.enable = checked;
        const msg = await HttpUtil.post(`/panel/api/subscription-market/upstreams/toggle/${record.id}`, {
          enable: checked
        });
        if (!msg.success) {
          record.enable = previous;
          return;
        }
        await this.loadAll();
      },
      async toggleNode(record, checked) {
        const previous = record.enable;
        record.enable = checked;
        const msg = await HttpUtil.post(`/panel/api/subscription-market/nodes/toggle/${record.id}`, {
          enable: checked
        });
        if (!msg.success) {
          record.enable = previous;
        }
      },
      async copyNodeLink(record) {
        const text = record.link || record.clash || '';
        const ok = await ClipboardManager.copyText(text);
        this.$message[ok ? 'success' : 'error'](ok ? '已复制' : '复制失败');
      },
      confirmDeleteUpstream(record) {
        this.$confirm({
          title: '删除上游订阅',
          content: `确定删除「${record.name}」及其所有节点授权吗？`,
          okText: '删除',
          cancelText: '取消',
          class: themeSwitcher.currentTheme,
          onOk: async () => {
            const msg = await HttpUtil.post(`/panel/api/subscription-market/upstreams/delete/${record.id}`);
            if (msg.success) {
              await this.loadAll();
            }
          },
        });
      },
      formatTraffic(value) {
        return SizeFormatter.sizeFormat(Number(value || 0));
      },
      formatRemainingTraffic(record) {
        const total = Number(record.total || 0);
        if (total <= 0) return '未知';
        const used = Number(record.upload || 0) + Number(record.download || 0);
        return this.formatTraffic(Math.max(total - used, 0));
      },
      remainingTrafficColor(record) {
        const total = Number(record.total || 0);
        if (total <= 0) return 'purple';
        const used = Number(record.upload || 0) + Number(record.download || 0);
        const left = Math.max(total - used, 0);
        if (left <= 0) return 'red';
        if (left / total <= 0.15) return 'orange';
        return 'green';
      },
      formatRemainingDays(value) {
        const expiresAt = Number(value || 0);
        if (expiresAt <= 0) return '未知';
        const diff = expiresAt - Date.now();
        if (diff <= 0) return '已到期';
        return `剩余 ${Math.ceil(diff / 86400000)} 天`;
      },
      remainingDaysColor(value) {
        const expiresAt = Number(value || 0);
        if (expiresAt <= 0) return 'purple';
        const diff = expiresAt - Date.now();
        if (diff <= 0) return 'red';
        if (diff <= 7 * 86400000) return 'orange';
        return 'green';
      },
      formatDateMs(value) {
        if (!value) return '未知';
        return IntlUtil.formatDate(Number(value));
      },
      formatUnix(value) {
        if (!value) return '-';
        return IntlUtil.formatDate(Number(value) * 1000);
      },
    },
    mounted() {
      this.loadAll();
    },
  });
</script>
<style>
  .error-tag {
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
</style>
{{ template "page/body_end" .}}
